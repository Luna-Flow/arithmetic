name: Publish Package
run-name: Publish arithmetic ${{ inputs.release_version }}

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version declared in moon.mod, without a v prefix
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-moonbit
      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          PACKAGE_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' moon.mod)
          test -n "$PACKAGE_VERSION"
          test "$RELEASE_VERSION" = "$PACKAGE_VERSION"
      - name: Update registry
        run: moon update
      - name: Build all targets
        run: moon build --target all
      - name: Check all targets
        run: moon check --target all --frozen
      - name: Test default target
        run: moon test --frozen
      - name: Test JavaScript target
        run: moon test --target js --frozen
      - name: Test native target
        run: moon test --target native --frozen
      - name: Validate public interface snapshot
        run: |
          moon info
          git diff --exit-code -- src/pkg.generated.mbti
      - name: Check formatting
        run: moon fmt --check
      - name: Publish to mooncakes
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
        run: |
          trap 'rm -f ~/.moon/credentials.json' EXIT
          mkdir -p ~/.moon
          printf '%s' "$SECRET" > ~/.moon/credentials.json
          moon publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: gh release create "v$RELEASE_VERSION" --title "v$RELEASE_VERSION" --generate-notes
